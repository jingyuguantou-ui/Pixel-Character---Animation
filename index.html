<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0D0D1A">
  <title>像素角色生成器</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0D0D1A;--surface:#1a1a2e;--surface2:#2a2a3e;
      --accent:#FF6B9D;--text:#FFFFFF;--text2:#aaaacc;
      --tab-bg:rgba(26,26,46,0.95);--panel-bg:rgba(30,30,50,0.97);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;touch-action:manipulation}
    #app{display:flex;flex-direction:column;height:100%;height:100dvh}
    #header{height:44px;display:flex;align-items:center;justify-content:center;padding:0 12px;flex-shrink:0;position:relative;z-index:10;gap:8px}
    #header h1{font-family:'VT323',monospace;font-size:20px;letter-spacing:2px;color:var(--accent);text-shadow:0 0 12px rgba(255,107,157,0.5)}
    /* Canvas fills entire screen */
    #canvas-wrap{flex:1;min-height:0;position:relative;overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center}
    #charCanvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);image-rendering:pixelated;image-rendering:crisp-edges}
    /* Top toolbar */
    #top-bar{position:absolute;top:6px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 8px;z-index:10;pointer-events:none}
    #top-bar>*{pointer-events:auto }
    .tool-group{display:flex;gap:6px;align-items:center}
    .tool-btn{width:34px;height:34px;border-radius:10px;background:var(--surface);border:1px solid var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--text);flex-shrink:0;transition:transform 0.1s}
    .tool-btn:active{transform:scale(0.88)}
    .tool-btn.active{border-color:var(--accent);color:var(--accent)}
    .size-btn{width:auto;padding:0 10px;font-size:11px;gap:4px;letter-spacing:0.5px}
    .size-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    /* Bottom Tabs */
    #bottom-tabs{height:56px;display:flex;flex-shrink:0;background:var(--tab-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--surface2);padding-bottom:var(--safe-bottom)}
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--text2);transition:color 0.15s}
    .tab-btn.active{color:var(--accent)}
    .tab-btn .tab-icon{font-size:18px;line-height:1}
    .tab-btn .tab-label{font-size:9px;letter-spacing:0.5px}
    /* Slide Panel */
    #slide-panel{position:fixed;bottom:0;left:0;right:0;background:var(--panel-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:20px 20px 0 0;border:1px solid var(--surface2);border-bottom:none;z-index:100;transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);padding-bottom:var(--safe-bottom);max-height:68vh;display:flex;flex-direction:column}
    #slide-panel.hidden{transform:translateY(100%)}
    #panel-handle{width:36px;height:4px;background:var(--surface2);border-radius:2px;margin:10px auto 6px;flex-shrink:0}
    #panel-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px 8px;flex-shrink:0}
    #panel-title{font-size:14px;font-weight:600}
    #panel-close{width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:14px;border:none}
    #panel-content{flex:1;overflow-y:auto;padding:0 14px 14px;-webkit-overflow-scrolling:touch}
    #panel-content::-webkit-scrollbar{width:0}
    .panel-section{margin-bottom:14px}
    .panel-section-title{font-size:11px;color:var(--text2);letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
    .color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(34px,1fr));gap:7px}
    .color-swatch{width:100%;aspect-ratio:1;border-radius:9px;cursor:pointer;border:2px solid transparent;transition:transform 0.1s,border-color 0.1s}
    .color-swatch:active{transform:scale(0.88)}
    .color-swatch.selected{border-color:var(--accent)}
    .module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:7px}
    .module-card{background:var(--surface);border-radius:11px;padding:7px 3px;text-align:center;cursor:pointer;border:2px solid transparent;transition:transform 0.1s,border-color 0.1s;font-size:10px;color:var(--text2);min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
    .module-card:active{transform:scale(0.92)}
    .module-card.selected{border-color:var(--accent);background:var(--surface2)}
    .module-icon{font-size:20px;line-height:1}
    .anim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:7px}
    .anim-card{background:var(--surface);border-radius:11px;padding:9px 5px;text-align:center;cursor:pointer;border:2px solid transparent;transition:transform 0.1s,border-color 0.1s;font-size:10px;color:var(--text2);min-height:46px;display:flex;align-items:center;justify-content:center}
    .anim-card:active{transform:scale(0.92)}
    .anim-card.selected{border-color:var(--accent);background:var(--surface2)}
    .acc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:7px}
    .acc-card{background:var(--surface);border-radius:11px;padding:7px;text-align:center;cursor:pointer;border:2px solid transparent;transition:transform 0.1s,border-color 0.1s;font-size:10px;color:var(--text2)}
    .acc-card:active{transform:scale(0.92)}
    .acc-card.selected{border-color:var(--accent);background:var(--surface2)}
    .acc-icon{font-size:22px;margin-bottom:3px}
    /* Toast */
    #toast{position:fixed;top:54px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(0,0,0,0.85);color:white;padding:9px 18px;border-radius:18px;font-size:13px;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;z-index:200;white-space:nowrap}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    /* Export Sheet */
    #export-modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
    #export-modal.open{display:flex}
    #export-sheet{background:var(--panel-bg);border-radius:20px 20px 0 0;padding:20px;padding-bottom:calc(20px + var(--safe-bottom));width:100%;max-width:400px}
    #export-sheet h3{font-size:15px;margin-bottom:14px;text-align:center}
    .export-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
    .export-item{background:var(--surface);border-radius:13px;padding:12px 6px;text-align:center;cursor:pointer;border:2px solid transparent;transition:transform 0.1s;font-size:11px;color:var(--text2)}
    .export-item:active{transform:scale(0.92)}
    .export-item .export-icon{font-size:26px;margin-bottom:5px;display:block}
    /* Fav Sheet */
    #fav-modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
    #fav-modal.open{display:flex}
    #fav-sheet{background:var(--panel-bg);border-radius:20px 20px 0 0;padding:20px;padding-bottom:calc(20px + var(--safe-bottom));width:100%;max-height:70vh;display:flex;flex-direction:column}
    #fav-sheet h3{font-size:15px;margin-bottom:14px;text-align:center}
    #fav-list{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:7px;-webkit-overflow-scrolling:touch}
    #fav-list::-webkit-scrollbar{width:0}
    .fav-item{background:var(--surface);border-radius:9px;padding:5px;text-align:center;cursor:pointer;font-size:9px;color:var(--text2)}
    .fav-item canvas{border-radius:5px;width:100%!important;height:auto!important;image-rendering:pixelated}
    .fav-item .fav-time{margin-top:3px;font-size:8px;opacity:0.5}
    .fav-item .fav-del{color:#ff6b6b;font-size:9px;margin-top:2px}
    .no-fav{text-align:center;color:var(--text2);padding:24px;font-size:13px;line-height:1.6}
    /* Play/Pause */
    .play-btn{font-size:16px}
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>PIXEL MAKER</h1>
  </div>

  <div id="canvas-wrap">
    <canvas id="charCanvas"></canvas>
    <div id="top-bar">
      <div class="tool-group">
        <button class="tool-btn" id="playBtn" onclick="togglePlay()" title="播放/暂停">&#x25B6;</button>
        <button class="tool-btn" id="outlineBtn" onclick="toggleOutline()" title="轮廓线">&#x25A3;</button>
      </div>
      <div class="tool-group">
        <button class="tool-btn size-btn size-sm" onclick="setGridSize(16)" title="小头像">小</button>
        <button class="tool-btn size-btn size-md active" onclick="setGridSize(32)" title="中全身">中</button>
        <button class="tool-btn size-btn size-lg" onclick="setGridSize(64)" title="大场景">大</button>
        <button class="tool-btn" onclick="randomGenerate()" title="随机">&#x1F3B2;</button>
      </div>
      <div class="tool-group">
        <button class="tool-btn" onclick="toggleFavorites()" title="收藏">&#x2B50;</button>
        <button class="tool-btn" onclick="toggleExport()" title="导出">&#x2B07;</button>
      </div>
    </div>
  </div>

  <div id="bottom-tabs">
    <div class="tab-btn active" onclick="openPanel('colors')"><div class="tab-icon">&#x1F3A8;</div><div class="tab-label">颜色</div></div>
    <div class="tab-btn" onclick="openPanel('hair')"><div class="tab-icon">&#x1F487;</div><div class="tab-label">发型</div></div>
    <div class="tab-btn" onclick="openPanel('face')"><div class="tab-icon">&#x1F63A;</div><div class="tab-label">表情</div></div>
    <div class="tab-btn" onclick="openPanel('clothes')"><div class="tab-icon">&#x1F455;</div><div class="tab-label">服装</div></div>
    <div class="tab-btn" onclick="openPanel('accessories')"><div class="tab-icon">&#x1F4FF;</div><div class="tab-label">配件</div></div>
    <div class="tab-btn" onclick="openPanel('animation')"><div class="tab-icon">&#x1F3AC;</div><div class="tab-label">动画</div></div>
    <div class="tab-btn" onclick="openPanel('scene')"><div class="tab-icon">&#x1F3D7;</div><div class="tab-label">场景</div></div>
  </div>
</div>

<div id="slide-panel" class="hidden">
  <div id="panel-handle"></div>
  <div id="panel-header">
    <div id="panel-title">颜色</div>
    <button id="panel-close" onclick="closePanel()">&#x2715;</button>
  </div>
  <div id="panel-content"></div>
</div>

<div id="toast"></div>

<div id="export-modal">
  <div id="export-sheet">
    <h3>导出格式</h3>
    <div class="export-grid">
      <div class="export-item" onclick="doExport('png')"><span class="export-icon">&#x1F5BC;</span>PNG</div>
      <div class="export-item" onclick="doExport('gif')"><span class="export-icon">&#x1F3AC;</span>GIF</div>
      <div class="export-item" onclick="doExport('apng')"><span class="export-icon">&#x1F300;</span>APNG</div>
      <div class="export-item" onclick="doExport('mp4')"><span class="export-icon">&#x1F3AD;</span>MP4</div>
      <div class="export-item" onclick="doExport('sprite')"><span class="export-icon">&#x1F3C6;</span>精灵图</div>
      <div class="export-item" onclick="doExport('svg')"><span class="export-icon">&#x1F4CA;</span>SVG</div>
    </div>
  </div>
</div>

<div id="fav-modal">
  <div id="fav-sheet">
    <h3>我的收藏</h3>
    <div id="fav-list"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/upng-js@0.1.1/UPNG.min.js"></script>
<script>

  hairColors:['#1A1A1A','#2D2D2D','#3D3D3D','#4A4A4A','#4A3728','#5D4037','#6B4423','#8B6914','#A0522D','#8B4513','#A52A2A','#B22222','#CD5C5C','#DAA520','#F4A460','#D2B48C','#DEB887','#808080','#A9A9A9','#C0C0C0','#DCDCDC'],

  hairs:[
    {id:'hair-0',name:'光头'},{id:'hair-1',name:'短发'},{id:'hair-2',name:'长发'},{id:'hair-3',name:'卷发'},

    {id:'face-8',name:'困惑'},{id:'face-9',name:'睡着'},{id:'face-10',name:'吐舌'},{id:'face-11',name:'墨镜'},
    {id:'face-12',name:'爱心眼'},{id:'face-13',name:'晕眩'},{id:'face-14',name:'恶魔'},{id:'face-15',name:'天使'},

    {id:'face-20',name:'害羞'},{id:'face-21',name:'兴奋'},{id:'face-22',name:'战斗'}
  ],

    {id:'cloth-8',name:'工装'},{id:'cloth-9',name:'和服'},{id:'cloth-10',name:'医生'},{id:'cloth-11',name:'警察'},
    {id:'cloth-12',name:'消防'},{id:'cloth-13',name:'厨师'},{id:'cloth-14',name:'教师'},{id:'cloth-15',name:'宇航服'},
    {id:'cloth-16',name:'机甲'},{id:'cloth-17',name:'赛博'},{id:'cloth-18',name:'铠甲'},{id:'cloth-19',name:'礼服'},
    {id:'cloth-20',name:'汉服'},{id:'cloth-21',name:'罗马'},{id:'cloth-22',name:'足球'},{id:'cloth-23',name:'篮球'},
    {id:'cloth-24',name:'网球'},{id:'cloth-25',name:'精灵'},{id:'cloth-26',name:'法师'},{id:'cloth-27',name:'骑士'},

const state={
  gridSize:32,pixelSize:12,skinColor:'#F5C9A8',hairColor:'#4A3728',
  clothColor:'#4ECDC4',accentColor:'#333333',bgColor:'#FFFFFF',
  hair:'hair-1',face:'face-0',cloth:'cloth-0',accessories:[],
  background:'bg-0',scene:'scene-0',animation:'bounce',animating:true,animSpeed:1,frame:0,outlineEnabled:true
};
const ANIMATION_NAMES={
  'none':'无','breath':'呼吸','blink':'眨眼','bounce':'弹跳',
  'peanuts-sway':'摇摆舞','peanuts-clap':'拍手','peanuts-kick':'踢腿',
  'peanuts-stomp':'跺脚','peanuts-bow':'鞠躬','peanuts-slide':'滑步',
  'peanuts-turn':'转身','peanuts-wave':'波浪','peanuts-disco':'迪斯科',
  'peanuts-snoopy':'史努比','peanuts-linucy':'完整舞',
  'robot-dance':'机械舞','hiphop-dance':'街舞','shy-action':'害羞',
  'excited-jump':'兴奋跳','boxing-combo':'拳击','spin-jump':'旋转跳',
  'rock-gesture':'摇滚','splits-handstand':'下犬','spin-in-place':'原地转',

  'pantomime':'默剧','float-fly':'飘飞'
};
// Canvas
const canvas=document.getElementById('charCanvas');
const ctx=canvas.getContext('2d');
function updateCanvasSize(){
  const wrap=document.getElementById('canvas-wrap');
  const maxW=wrap.clientWidth;
  const maxH=wrap.clientHeight;
  const g=state.gridSize;
  if(g===16){
    const size=Math.min(maxW,maxH);
    state.pixelSize=Math.max(1,Math.floor(size/g));
    canvas.style.position='absolute';
    canvas.style.top='50%';
    canvas.style.left='50%';
    canvas.style.transform='translate(-50%,-50%)';
    canvas.style.width='auto';
    canvas.style.height='auto';
    canvas.width=g*state.pixelSize;
    canvas.height=g*state.pixelSize;
  }else{
    state.pixelSize=Math.max(1,Math.floor(maxW/g));
    canvas.width=maxW;
    canvas.height=maxH;
  }
  adaptSystemColors();

function adaptSystemColors(){
  const bg=state.bgColor;
  const hex2rgb=h=>{const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return m?{r:parseInt(m[1],16),g:parseInt(m[2],16),b:parseInt(m[3],16)}:{r:0,g:0,b:0};};
  const lum=c=>{const a=hex2rgb(c);return 0.299*a.r+0.587*a.g+0.114*a.b;};
  const isLight=lum(bg)>128;
  const r=hex2rgb(bg);
  const surfR=Math.max(0,r.r-25),surfG=Math.max(0,r.g-25),surfB=Math.max(0,r.b-25);
  const surf2R=Math.max(0,r.r-45),surf2G=Math.max(0,r.g-45),surf2B=Math.max(0,r.b-45);
  const surf=`rgb(${surfR},${surfG},${surfB})`,surf2=`rgb(${surf2R},${surf2G},${surf2B})`;
  const textColor=isLight?'#1a1a1a':'#ffffff';
  const text2Color=isLight?'rgba(26,26,26,0.6)':'rgba(255,255,255,0.6)';
  document.documentElement.style.setProperty('--bg',bg);
  document.documentElement.style.setProperty('--surface',surf);
  document.documentElement.style.setProperty('--surface2',surf2);
  document.documentElement.style.setProperty('--text',textColor);
  document.documentElement.style.setProperty('--text2',text2Color);
  document.querySelector('#canvas-wrap').style.background=bg;
}

function darkenColor(h,p){const n=parseInt(h.slice(1),16);const a=Math.round(2.55*p);return'#'+(0x1000000+Math.max((n>>16)-a,0)*0x10000+Math.max((n>>8&0xFF)-a,0)*0x100+Math.max((n&0xFF)-a,0)).toString(16).slice(1);}

function drawStar(cx,cy,ir,or,p){const s=4,t=Math.PI/s;ctx.beginPath();for(let i=0;i<s*2;i++){const r=i%2===0?or:ir,a=i*t-Math.PI/2;const x=cx+Math.cos(a)*r*p/4,y=cy+Math.sin(a)*r*p/4;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.closePath();ctx.fill();}

// Render
function render(){
  const g=state.gridSize,p=state.pixelSize;
  let gridOffX=0,gridOffY=0;
  if(g===16){
    gridOffX=Math.floor((canvas.width-g*p)/2/p);
    gridOffY=Math.floor((canvas.height-g*p)/2/p);
  }else if(g===64){
    gridOffX=Math.round((canvas.width-g*p)/2/p);
    gridOffY=Math.round((canvas.height-g*p)/2/p);
  }else if(g===32){
    gridOffY=Math.round(canvas.height/p/2-g/2);
  }
  const offset=Math.floor(g/2)+gridOffX;
  const baseY=(g===64?52:(g===16?26:30))+gridOffY;
  drawBackground(gridOffX,gridOffY);
  computeAnimation(state.frame,state.animSpeed||1);
  const ox=Math.round(aX),oy=Math.round(aY);
  drawBackWings(offset,ox,oy,baseY);
  drawClothing(offset,ox,oy,baseY);
  drawAnimatedLimbs(offset,ox,oy,aL,aR,lL,lR,baseY);
  drawHandheldItems(offset,aR,ox,oy,baseY);
  const hs=8,bodyY=baseY+oy,hY=bodyY-20+Math.round(hBob*0.3),hX=offset+ox+Math.round(hSway*0.3);
  for(let dy=0;dy<hs;dy++)for(let dx=0;dx<hs;dx++){const ed=Math.max(Math.abs(dx-hs/2+0.5),Math.abs(dy-hs/2+0.5));if(ed<hs/2)drawPixel(hX-hs/2+dx,hY+dy,state.skinColor);}
  if(state.hair!=='hair-0')drawHair(hX,hY,0);
  drawFace(hX,hY,0);
  drawAccessory(hX,hY,0);
  state.frame++;
}

let animId=null,lastT=0;
function animate(t){

}

// Smart generation helpers
function getContrast(c1,c2){
  const hex2rgb=h=>{const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return m?{r:parseInt(m[1],16),g:parseInt(m[2],16),b:parseInt(m[3],16)}:{r:0,g:0,b:0};};
  const lum=h=>{const c=hex2rgb(h);return(0.299*c.r+0.587*c.g+0.114*c.b);};
  const l1=lum(c1),l2=lum(c2);
  return(Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);
}
function isSimilar(c1,c2,t=30){
  const hex2rgb=h=>{const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return r?{r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)}:{r:0,g:0,b:0};};
  const a=hex2rgb(c1),b=hex2rgb(c2);
  return Math.abs(a.r-b.r)<t&&Math.abs(a.g-b.g)<t&&Math.abs(a.b-b.b)<t;
}
function getSkinLuminance(c){
  const h=c.replace('#','');const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
  return 0.299*r+0.587*g+0.114*b;
}
function ensureContrast(color,bg,min=2.5){
  const hex2rgb=h=>{const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return m?{r:parseInt(m[1],16),g:parseInt(m[2],16),b:parseInt(m[3],16)}:{r:0,g:0,b:0};};
  const lum=c=>{const a=hex2rgb(c);return(0.299*a.r+0.587*a.g+0.114*a.b);};
  if(getContrast(color,bg)>=min)return color;
  const darks=['#1A1A1A','#2D2D2D','#1a1a2e','#3D2914'];
  const lights=['#FFFFFF','#F5F5DC','#FFF8DC','#FFEFD5'];
  const bgLum=lum(bg);

}

function randomGenerate(){

    const extremes=MODULE_LIBRARY.skinColors.filter(c=>getSkinLuminance(c)<60||getSkinLuminance(c)>200);
    newSkin=extremes.length>0?randomChoice(extremes):randomChoice(MODULE_LIBRARY.skinColors);
  }else{
    const avail=MODULE_LIBRARY.skinColors.filter(c=>!avoidSkin.includes(c));
    newSkin=avail.length>0?randomChoice(avail):randomChoice(MODULE_LIBRARY.skinColors);

  state.skinColor=ensureContrast(newSkin,state.bgColor,2.5);

      'scene-4':randomChoice(['#FFF8E1','#FFECB3','#FFE082','#FFD54F']),
      'scene-5':randomChoice(['#E8EAF6','#C5CAE9','#9FA8DA','#7986CB']),
      'scene-6':randomChoice(['#E8F4FD','#BBDEFB','#90CAF9','#64B5F6']),
      'scene-7':randomChoice(['#FCE4EC','#F8BBD9','#F48FB1','#F06292']),
      'scene-8':randomChoice(['#E1F5FE','#B3E5FC','#81D4FA','#4FC3F7']),

async function exportAnimation(fmt){if(state.animation==='none'){showToast('\u26A0 \u8BF7\u5148\u9009\u62E9\u52A8\u753B');return;}showToast('\u1F3AC \u6B63\u5728\u751F\u6210...');const fc=40,fd=75,wa=state.animating;state.animating=true;const frames=[];for(let i=0;i<fc;i++){render();const c=document.createElement('canvas');c.width=canvas.width;c.height=canvas.height;c.getContext('2d').drawImage(canvas,0,0);frames.push(c);}state.animating=wa;render();if(fmt==='png')downloadPNG();else if(fmt==='gif')exportGIF(frames,fd);else if(fmt==='apng')await exportAPNG(frames,fd);else if(fmt==='mp4')await exportMP4(frames,fd);else if(fmt==='sprite')exportSprite(frames);else if(fmt==='svg')exportSVGAnim(frames,fd);}
function exportGIF(frames,delay){const gb=[];gb.push(0x47,0x49,0x46,0x38,0x39,0x61);const w=canvas.width,h=canvas.height;gb.push(w&0xFF,(w>>8)&0xFF,h&0xFF,(h>>8)&0xFF,0xF0,0x00,0x00);for(let i=0;i<256;i++)gb.push(0,0,0);gb.push(0x21,0xFF,0x0B,0x4E,0x45,0x54,0x53,0x43,0x41,0x50,0x45,0x32,0x2E,0x30,0x03,0x01,0x00,0x00,0x00);for(const f of frames){gb.push(0x21,0xF9,0x04,0x00,(delay/10)&0xFF,((delay/10)>>8)&0xFF,0x00,0x00);gb.push(0x2C,0x00,0x00,0x00,0x00,w&0xFF,(w>>8)&0xFF,h&0xFF,(h>>8)&0xFF,0x00,0x08);const id=[];const px=f.getContext('2d').getImageData(0,0,w,h).data;for(let i=0;i<px.length;i+=4)id.push(Math.floor(px[i]/32)*8+Math.floor(px[i+1]/32)*2+Math.floor(px[i+2]/64));const comp=simpleLZW(id);let pos=0;while(pos<comp.length){const s=Math.min(comp.length-pos,255);gb.push(s);for(let j=0;j<s;j++)gb.push(comp[pos++]);}gb.push(0x00);}gb.push(0x3B);downloadBlob(new Blob([new Uint8Array(gb)],{type:'image/gif'}),`pixel-${Date.now()}.gif`);showToast('\u1F3AC GIF\u5DF2\u5BFC\u51FA\uFF01');}
async function exportAPNG(frames,delay){try{const arr=frames.map(f=>{const d=f.getContext('2d').getImageData(0,0,f.width,f.height);return new Uint8Array(d.data.buffer);});const apng=UPNG.encode(arr,canvas.width,canvas.height,0,frames.map(()=>delay));downloadBlob(new Blob([apng],{type:'image/apng'}),`pixel-${Date.now()}.apng`);showToast('\u1F300 APNG\u5DF2\u5BFC\u51FA\uFF01');}catch(e){showToast('\u26A0 APNG\u5931\u8D25\uFF0C\u5C1D\u8BD5GIF');exportGIF(frames,delay);}}
async function exportMP4(frames,delay){try{const rec=document.createElement('canvas');rec.width=canvas.width;rec.height=canvas.height;const rc=rec.getContext('2d');const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);let mime='video/webm;codecs=vp9',ext='webm';if(isIOS&&MediaRecorder.isTypeSupported('video/mp4')){mime='video/mp4';ext='mp4';}const stream=rec.captureStream(Math.round(1000/delay));const mr=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:5000000});const chunks=[];mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};mr.onstop=()=>{const blob=new Blob(chunks,{type:mime.split(';')[0]});downloadBlob(blob,`pixel-${Date.now()}.${ext}`);showToast('\u1F3AD \u89C6\u9891\u5DF2\u5BFC\u51FA\uFF01');};mr.start(100);for(const f of frames){rc.drawImage(f,0,0);await new Promise(r=>setTimeout(r,delay));}mr.stop();}catch(e){showToast('\u26A0 \u89C6\u9891\u5BFC\u51FA\u5931\u8D25');}}
function exportSprite(frames){const cols=Math.min(4,frames.length),rows=Math.ceil(frames.length/cols);const sc=document.createElement('canvas');sc.width=canvas.width*cols;sc.height=canvas.height*rows;const sx=sc.getContext('2d');frames.forEach((f,i)=>sx.drawImage(f,(i%cols)*canvas.width,Math.floor(i/cols)*canvas.height));sc.toBlob(b=>{downloadBlob(b,`pixel-sprite-${Date.now()}.png`);showToast('\u1F3C6 \u7CBE\u7075\u56FE\u5DF2\u5BFC\u51FA\uFF01');},'image/png');}
function exportSVGAnim(frames,delay){const w=canvas.width,h=canvas.height;const sc=document.createElement('canvas');sc.width=w*frames.length;sc.height=h;const sx=sc.getContext('2d');frames.forEach((f,i)=>sx.drawImage(f,i*w,0));const url=sc.toDataURL('image/png');const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w*3}" height="${h*3}" viewBox="0 0 ${w} ${h}" style="image-rendering:pixelated"><defs><style>@keyframes a{from{transform:translateX(0)}to{transform:translateX(-${w*frames.length}px)}}.s{animation:a ${frames.length*delay/1000}s steps(${frames.length}) infinite}</style><clipPath id="c"><rect width="${w}" height="${h}"/></clipPath></defs><g clip-path="url(#c)"><image class="s" href="${url}" width="${w*frames.length}" height="${h}"/></g></svg>`;downloadBlob(new Blob([svg],{type:'image/svg+xml'}),`pixel-${Date.now()}.svg`);showToast('\u1F4CA SVG\u52A8\u753B\u5DF2\u5BFC\u51FA\uFF01');}
function simpleLZW(data){const out=[];let cs=9;const cc=256,eoc=257;let ds=new Map();for(let i=0;i<256;i++)ds.set(String(i),i);let dsz=258;let buf=0,bl=0;const wc=c=>{buf|=c<<bl;bl+=cs;while(bl>=8){out.push(buf&0xFF);buf>>=8;bl-=8;}};wc(cc);if(data.length>0){let cur=String(data[0]);for(let i=1;i<data.length;i++){const n=String(data[i]);if(ds.has(cur+','+n)){cur=cur+','+n;}else{wc(ds.get(cur));if(dsz<4096){ds.set(cur+','+n,dsz++);if(dsz>=(1<<cs)&&cs<12)cs++;}else{ds=new Map();for(let j=0;j<256;j++)ds.set(String(j),j);dsz=258;cs=9;wc(cc);}cur=n;}}wc(ds.get(cur));}wc(eoc);if(bl>0)out.push(buf&0xFF);return out;}
function downloadBlob(blob,name){const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);}
// Toast
function showToast(msg){const t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
// Mobile UI
let currentPanel='colors';
function openPanel(name){currentPanel=name;const panel=document.getElementById('slide-panel'),content=document.getElementById('panel-content');const titles={colors:'\u989C\u8272',hair:'\u53D1\u578B',face:'\u8868\u60C5',clothes:'\u670D\u88C5',accessories:'\u914D\u4EF6',animation:'\u52A8\u753B',scene:'\u573A\u666F'};document.getElementById('panel-title').textContent=titles[name]||'\u9009\u62E9';loadPanelContent(name,content);panel.classList.remove('hidden');document.querySelectorAll('.tab-btn').forEach((t,i)=>t.classList.toggle('active',['colors','hair','face','clothes','accessories','animation','scene'][i]===name));}
function closePanel(){document.getElementById('slide-panel').classList.add('hidden');document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));document.querySelector('.tab-btn').classList.add('active');}
function loadPanelContent(name,container){switch(name){
  case'colors':container.innerHTML=`<div class="panel-section"><div class="panel-section-title">\u80A4\u8272</div><div class="color-grid" id="mSkin"></div></div><div class="panel-section"><div class="panel-section-title">\u53D1\u8272</div><div class="color-grid" id="mHair"></div></div><div class="panel-section"><div class="panel-section-title">\u8863\u670D\u989C\u8272</div><div class="color-grid" id="mCloth"></div></div>`;buildColorGrid('mSkin',MODULE_LIBRARY.skinColors,'skinColor');buildColorGrid('mHair',MODULE_LIBRARY.hairColors,'hairColor');buildColorGrid('mCloth',MODULE_LIBRARY.clothColors,'clothColor');break;
  case'hair':container.innerHTML=`<div class="module-grid" id="mHairGrid"></div>`;MODULE_LIBRARY.hairs.forEach(h=>{const c=document.createElement('div');c.className='module-card'+(state.hair===h.id?' selected':'');c.innerHTML=`<div class="module-icon">&#x1F487;</div><div>${h.name}</div>`;c.onclick=()=>{state.hair=h.id;render();loadPanelContent('hair',container);};container.querySelector('#mHairGrid').appendChild(c);});break;
  case'face':container.innerHTML=`<div class="module-grid" id="mFaceGrid"></div>`;const fi=['&#x1F60A;','&#x1F60E;','&#x1F914;','&#x1F62E;','&#x1F61F;','&#x1F60A;','&#x1F621;','&#x1F622;','&#x1F615;','&#x1F634;','&#x1F61B;','&#x1F576;','&#x1F49D;','&#x1F4AB;','&#x1F47F;','&#x1F607;','&#x1F916;','&#x1F63A;','&#x1F47B;','&#x1F914;','&#x1F633;','&#x1F929;','&#x1F62C;'];MODULE_LIBRARY.faces.forEach((f,i)=>{const c=document.createElement('div');c.className='module-card'+(state.face===f.id?' selected':'');c.innerHTML=`<div class="module-icon">${fi[i]||'&#x1F63A;'}</div><div>${f.name}</div>`;c.onclick=()=>{state.face=f.id;render();loadPanelContent('face',container);};container.querySelector('#mFaceGrid').appendChild(c);});break;
  case'clothes':container.innerHTML=`<div class="module-grid" id="mClothGrid"></div>`;MODULE_LIBRARY.clothes.forEach(c=>{const card=document.createElement('div');card.className='module-card'+(state.cloth===c.id?' selected':'');card.innerHTML=`<div class="module-icon">&#x1F455;</div><div>${c.name}</div>`;card.onclick=()=>{state.cloth=c.id;render();loadPanelContent('clothes',container);};container.querySelector('#mClothGrid').appendChild(card);});break;
  case'accessories':container.innerHTML=`<div class="acc-grid" id="mAccGrid"></div>`;MODULE_LIBRARY.accessories.forEach(a=>{const c=document.createElement('div');c.className='acc-card'+(state.accessories.includes(a.id)?' selected':'');c.innerHTML=`<div class="acc-icon">${a.cat==='glasses'?'&#x1F576;':a.cat==='head'?'&#x1F3A9;':a.cat==='helmet'?'&#x1F6E1;':a.cat==='wings'?'&#x1F987;':'&#x1F4FF;'}</div><div>${a.name}</div>`;c.onclick=()=>{if(a.id==='acc-0'){state.accessories=[];}else{if(state.accessories.includes(a.id))state.accessories=state.accessories.filter(x=>x!==a.id);else if(state.accessories.length<4)state.accessories.push(a.id);else state.accessories.splice(0,1,a.id);}render();loadPanelContent('accessories',container);};container.querySelector('#mAccGrid').appendChild(c);});break;
  case'animation':container.innerHTML=`<div class="panel-section"><div class="panel-section-title">\u57FA\u7840\u52A8\u753B</div><div class="anim-grid" id="mBaseAnim"></div></div><div class="panel-section"><div class="panel-section-title">\u82B1\u751F\u821E\u8E22</div><div class="anim-grid" id="mDanceAnim"></div></div><div class="panel-section"><div class="panel-section-title">\u7279\u8272\u52A8\u4F5C</div><div class="anim-grid" id="mSpecialAnim"></div></div>`;buildAnimGrid('mBaseAnim',['none','breath','blink','bounce'],container);buildAnimGrid('mDanceAnim',['peanuts-sway','peanuts-clap','peanuts-kick','peanuts-stomp','peanuts-bow','peanuts-slide','peanuts-turn','peanuts-wave','peanuts-disco','peanuts-snoopy','peanuts-linucy'],container);buildAnimGrid('mSpecialAnim',['robot-dance','hiphop-dance','shy-action','excited-jump','boxing-combo','spin-jump','rock-gesture','float-fly','bunny-hop','spin-in-place','conductor','squat-stand','pantomime'],container);break;
  case'scene':container.innerHTML=`<div class="module-grid" id="mSceneGrid"></div>`;const sceneEmojis=['&#x1F333','&#x1F30B','&#x1F332','&#x26F7','&#x1F3DC','&#x1F33F','&#x1F309','&#x1F3AA','&#x1F3CA','&#x1F3EB','&#x26E9','&#x1F680'];MODULE_LIBRARY.scenes.forEach((s,i)=>{const c=document.createElement('div');c.className='module-card'+(state.scene===s.id?' selected':'');c.innerHTML=`<div class="module-icon">${sceneEmojis[i]||'&#x1F3D7;'}</div><div>${s.name}</div>`;c.onclick=()=>{state.scene=s.id;render();loadPanelContent('scene',container);};container.querySelector('#mSceneGrid').appendChild(c);});break;
}}
function buildColorGrid(id,colors,key){const el=document.getElementById(id);el.innerHTML='';colors.forEach(c=>{const s=document.createElement('div');s.className='color-swatch'+(state[key]===c?' selected':'');s.style.background=c;s.onclick=()=>{state[key]=c;render();buildColorGrid(id,colors,key);};el.appendChild(s);});}
function buildAnimGrid(id,anims,container){const el=container.querySelector('#'+id);el.innerHTML='';anims.forEach(a=>{const c=document.createElement('div');c.className='anim-card'+(state.animation===a?' selected':'');c.textContent=ANIMATION_NAMES[a]||a;c.onclick=()=>{state.animation=a;state.frame=0;if(a==='none'){state.animating=false;stopAnim();}else{state.animating=true;startAnim();}render();buildAnimGrid(id,anims,container);};el.appendChild(c);});}
// Export / Fav
function toggleExport(){document.getElementById('export-modal').classList.toggle('open');document.getElementById('fav-modal').classList.remove('open');}
function toggleFavorites(){const m=document.getElementById('fav-modal');m.classList.toggle('open');document.getElementById('export-modal').classList.remove('open');loadFavorites();}
function loadFavorites(){const list=document.getElementById('fav-list');list.innerHTML='';const keys=Object.keys(localStorage).filter(k=>k.startsWith('pixelChar_')).reverse();if(keys.length===0){list.innerHTML='<div class="no-fav">\u6682\u65E0\u6536\u85CF<br><br><button class="tool-btn" style="width:auto;padding:8px 16px;font-size:12px;display:inline-flex" onclick="saveCharacter()">&#x1F4BE; \u7ACB\u5373\u4FDD\u5B58</button></div>';return;}keys.slice(0,20).forEach(k=>{const data=JSON.parse(localStorage.getItem(k));const item=document.createElement('div');item.className='fav-item';const c=document.createElement('canvas');c.width=76;c.height=76;const tc=c.getContext('2d');const bakCanvas=canvas,bakCtx=ctx;Object.assign(state,data);state.pixelSize=2.5;state.frame=0;state.animating=false;const pc=document.createElement('canvas');pc.width=data.gridSize*2.5;pc.height=data.gridSize*2.5;canvas=pc;ctx=pc.getContext('2d');render();ctx=bakCtx;canvas=bakCanvas;Object.assign(state,data);tc.drawImage(pc,0,0,76,76);item.appendChild(c);const t=document.createElement('div');t.className='fav-time';t.textContent=new Date(data.savedAt).toLocaleDateString();item.appendChild(t);const d=document.createElement('div');d.className='fav-del';d.textContent='\u5220\u9664';d.onclick=e=>{e.stopPropagation();localStorage.removeItem(k);loadFavorites();};item.appendChild(d);item.onclick=()=>{Object.assign(state,data);updateCanvasSize();render();document.getElementById('fav-modal').classList.remove('open');showToast('\u1F3AC \u5DF2\u52A0\u8F7D\uFF01');};list.appendChild(item);});}
function doExport(fmt){document.getElementById('export-modal').classList.remove('open');if(fmt==='png')downloadPNG();else exportAnimation(fmt);}
// Init
window.addEventListener('DOMContentLoaded',()=>{updateCanvasSize();document.getElementById('outlineBtn').classList.add('active');startAnim();document.getElementById('panel-close').addEventListener('click',closePanel);document.getElementById('slide-panel').addEventListener('click',e=>{if(e.target.id==='slide-panel')closePanel();});document.getElementById('export-modal').addEventListener('click',e=>{if(e.target.id==='export-modal')toggleExport();});document.getElementById('fav-modal').addEventListener('click',e=>{if(e.target.id==='fav-modal')toggleFavorites();});});
</script>
